<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>All Products</title>

<!-- Bootstrap CSS -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<script type="text/javascript">
	function deleteConfirm() {
		return confirm("Are you sure ? want to delete it ?")
	}
</script>
</head>
<body style="background-color: #f5f7fa;">

	<div class="container mt-5">

		<!-- Success Message -->
		<div th:if="${msg}"
			class="alert alert-success alert-dismissible fade show" role="alert">
			<span th:text="${msg}"></span>
			<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
		</div>

		<!-- Card -->
		<div class="card shadow-lg">


			<div class="card-header bg-primary text-white">
				<a th:href="@{/}" class="btn btn-danger">Add new Product +</a>
				<h3 class="text-center">All Products</h3>
			</div>

			<div class="card-body">

				<div class="table-responsive">
					<table
						class="table table-bordered table-striped table-hover text-center">

						<thead class="table-dark">
							<tr>
								<th>ID</th>
								<th>Name</th>
								<th>Price</th>
								<th>Category</th>
								<th>Quantity</th>
								<th>Action</th>
							</tr>
						</thead>

						<tbody>
							<tr th:each="product:${products}">
								<td th:text="${product.id}"></td>
								<td th:text="${product.name}"></td>
								<td th:text="${product.price}"></td>
								<td th:text="${product.category}"></td>
								<td th:text="${product.qty}"></td>
								<td><a th:href="@{/update?(id=${product.id})}"
									class="btn btn-info">Update</a> <a
									th:href="@{/delete?(id=${product.id})}" class="btn btn-danger"
									onclick="return deleteConfirm()">Delete</a></td>
							</tr>
						</tbody>

					</table>






				</div>

			</div>

		</div>



	</div>

	<div class="d-flex justify-content-center mt-4 ml-2">

<nav>
<ul class="pagination">

<li class="page-item" th:if="${currentPage > 0}">
<a class="page-link" th:href="@{/products(page=${currentPage-1})}">
Previous
</a>
</li>

<li class="page-item" th:if="${currentPage < totalPages-1}">
<a class="page-link" th:href="@{/products(page=${currentPage+1})}" style="margin-left: 5px">
Next
</a>
</li>

</ul>
</nav>

</div>
	
	
	
	

	<!-- Bootstrap JS -->
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
